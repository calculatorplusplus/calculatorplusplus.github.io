<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calculator++</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #f0ece4;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
  position: relative;
  overflow: hidden;
}

/* big watermark text */
body::before {
  content: 'CALC++';
  position: fixed;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28vw;
  color: rgba(0,0,0,0.04);
  white-space: nowrap;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  user-select: none;
  letter-spacing: -0.02em;
}

.wrapper {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 0;
}

.brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.25em;
  color: #1a1a1a;
  margin-bottom: 12px;
  padding-left: 4px;
  opacity: 0.5;
}

.calc {
  background: #1a1a1a;
  width: 360px;
  padding: 0;
  position: relative;
  box-shadow: 8px 8px 0px #c8b89a;
}

/* orange stripe top */
.calc::before {
  content: '';
  display: block;
  height: 6px;
  background: repeating-linear-gradient(
    90deg,
    #ff5c1a 0px, #ff5c1a 18px,
    #1a1a1a 18px, #1a1a1a 24px
  );
}

.display-area {
  background: #0d0d0d;
  padding: 20px 24px 16px;
  border-bottom: 2px solid #ff5c1a;
  position: relative;
}

.history {
  font-size: 0.72rem;
  color: #555;
  min-height: 18px;
  text-align: right;
  letter-spacing: 0.05em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 6px;
}

.number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.8rem;
  color: #f0ece4;
  text-align: right;
  letter-spacing: 0.02em;
  line-height: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  transition: color 0.1s;
}

.number.flash { color: #ff5c1a; }

.op-indicator {
  position: absolute;
  top: 20px;
  left: 24px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  color: #ff5c1a;
  opacity: 0;
  transition: opacity 0.15s;
}
.op-indicator.show { opacity: 1; }

/* button grid */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border-left: 2px solid #ff5c1a;
}

button {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 0.05em;
  height: 72px;
  border: none;
  border-right: 2px solid #2a2a2a;
  border-bottom: 2px solid #2a2a2a;
  cursor: pointer;
  transition: background 0.08s, transform 0.06s;
  position: relative;
  outline: none;
}

button:active { transform: scale(0.95); }

.btn-num {
  background: #222;
  color: #f0ece4;
}
.btn-num:hover { background: #2e2e2e; }

.btn-op {
  background: #1a1a1a;
  color: #ff5c1a;
  font-size: 1.8rem;
  border-right: 2px solid #333;
  border-bottom: 2px solid #333;
}
.btn-op:hover { background: #2a1a10; }

.btn-clear {
  background: #ff5c1a;
  color: #1a1a1a;
  font-size: 1.3rem;
}
.btn-clear:hover { background: #ff7a3d; }

.btn-del {
  background: #2a2a2a;
  color: #ff5c1a;
  font-size: 1.3rem;
}
.btn-del:hover { background: #333; }

.btn-pct {
  background: #2a2a2a;
  color: #aaa;
}
.btn-pct:hover { background: #333; }

.btn-zero {
  grid-column: span 2;
  text-align: left;
  padding-left: 28px;
  font-size: 1.6rem;
}

.btn-eq {
  background: #ff5c1a;
  color: #1a1a1a;
  font-size: 2rem;
  grid-row: span 2;
  height: 144px;
  border-right: none;
}
.btn-eq:hover { background: #ff7a3d; }
.btn-eq:active { transform: scale(0.96); }

.btn-dot {
  background: #222;
  color: #aaa;
  font-size: 2rem;
}
.btn-dot:hover { background: #2e2e2e; }

/* last column no right border */
button:nth-child(4n) {
  border-right: none;
}

.footer {
  margin-top: 16px;
  font-size: 0.6rem;
  color: #999;
  letter-spacing: 0.18em;
  padding-left: 4px;
  text-transform: uppercase;
}

@keyframes popflash {
  0%   { background: #ff5c1a; color: #000; }
  100% { background: #222; color: #f0ece4; }
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="brand">CALCULATORPLUSPLUS.GITHUB.IO</div>
  <div class="calc" id="calc">
    <div class="display-area">
      <div class="op-indicator" id="opInd"></div>
      <div class="history" id="history"></div>
      <div class="number" id="display">0</div>
    </div>

    <div class="grid">
      <!-- Row 1 -->
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-del"   onclick="del()">DEL</button>
      <button class="btn-pct"   onclick="percent()">%</button>
      <button class="btn-op"    onclick="op('/')">÷</button>

      <!-- Row 2 -->
      <button class="btn-num" onclick="num('7')">7</button>
      <button class="btn-num" onclick="num('8')">8</button>
      <button class="btn-num" onclick="num('9')">9</button>
      <button class="btn-op"  onclick="op('*')">×</button>

      <!-- Row 3 -->
      <button class="btn-num" onclick="num('4')">4</button>
      <button class="btn-num" onclick="num('5')">5</button>
      <button class="btn-num" onclick="num('6')">6</button>
      <button class="btn-op"  onclick="op('-')">−</button>

      <!-- Row 4+5: 1,2,3 + tall equals -->
      <button class="btn-num" onclick="num('1')">1</button>
      <button class="btn-num" onclick="num('2')">2</button>
      <button class="btn-num" onclick="num('3')">3</button>
      <button class="btn-eq"  onclick="eq()">=</button>

      <!-- Row 5 cont -->
      <button class="btn-num btn-zero" onclick="num('0')">0</button>
      <button class="btn-dot"          onclick="dot()">.</button>
      <button class="btn-op"           onclick="op('+')">+</button>
    </div>
  </div>
  <div class="footer">v3.0.0 &nbsp;·&nbsp; All systems operational</div>
</div>

<script>
var cur      = '0';
var prev     = '';
var oper     = null;
var evaled   = false;

var dispEl   = document.getElementById('display');
var histEl   = document.getElementById('history');
var opIndEl  = document.getElementById('opInd');

function setDisplay(v, highlight) {
  dispEl.textContent = v;
  dispEl.classList.toggle('flash', !!highlight);
}

function setOp(o) {
  var sym = {'/':'÷','*':'×','-':'−','+':'+'}[o] || '';
  opIndEl.textContent = sym;
  opIndEl.classList.toggle('show', !!o);
}

function num(d) {
  if (evaled) { cur = d; evaled = false; }
  else if (cur === '0') { cur = d; }
  else if (cur.length < 13) { cur += d; }
  setDisplay(cur, false);
}

function dot() {
  if (evaled) { cur = '0.'; evaled = false; }
  else if (cur.indexOf('.') === -1) { cur += '.'; }
  setDisplay(cur, false);
}

function op(o) {
  if (oper && !evaled) { compute(true); }
  prev  = cur;
  oper  = o;
  evaled = false;
  cur   = '0';
  setOp(o);
  var sym = {'/':'÷','*':'×','-':'−','+':'+'}[o];
  histEl.textContent = prev + ' ' + sym;
  setDisplay('0', false);
}

function compute(chain) {
  if (!oper || !prev) return;
  var a = parseFloat(prev);
  var b = parseFloat(cur);
  var r;
  if (oper === '+') r = a + b;
  else if (oper === '-') r = a - b;
  else if (oper === '*') r = a * b;
  else if (oper === '/') r = b === 0 ? null : a / b;
  var sym = {'/':'÷','*':'×','-':'−','+':'+'}[oper];
  if (!chain) {
    histEl.textContent = prev + ' ' + sym + ' ' + cur + ' =';
    setOp(null);
  }
  cur    = r === null ? 'ERR' : String(parseFloat(r.toFixed(10)));
  oper   = null;
  prev   = '';
  evaled = true;
  setDisplay(cur, true);
}

function eq() {
  if (cur === '2421' && !oper) {
    easter();
    return;
  }
  compute(false);
}

function clearAll() {
  cur = '0'; prev = ''; oper = null; evaled = false;
  histEl.textContent = '';
  setOp(null);
  setDisplay('0', false);
}

function del() {
  if (evaled) { clearAll(); return; }
  cur = cur.length > 1 ? cur.slice(0, -1) : '0';
  setDisplay(cur, false);
}

function percent() {
  cur = String(parseFloat(cur) / 100);
  setDisplay(cur, false);
}

function easter() {
  var calc = document.getElementById('calc');
  var flashes = 0;
  var iv = setInterval(function() {
    flashes++;
    calc.style.outline = (flashes % 2 === 0) ? '4px solid #ff5c1a' : 'none';
    if (flashes >= 6) {
      clearInterval(iv);
      calc.style.outline = 'none';
      var w = window.open('about:blank', '_blank');
      if (w) {
        w.document.open();
        w.document.write(
          '<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>truffled.lol</title>' +
          '<style>*{margin:0;padding:0;box-sizing:border-box}' +
          'body{background:#000;height:100vh;overflow:hidden}' +
          'iframe{width:100%;height:100%;border:none;display:block}</style></head>' +
          '<body><iframe src="https://truffled.lol" allow="fullscreen"></iframe></body></html>'
        );
        w.document.close();
      }
    }
  }, 80);
}

document.addEventListener('keydown', function(e) {
  if ('0123456789'.indexOf(e.key) !== -1) { num(e.key); return; }
  if (e.key === '.')         { dot(); return; }
  if (e.key === '+')         { op('+'); return; }
  if (e.key === '-')         { op('-'); return; }
  if (e.key === '*')         { op('*'); return; }
  if (e.key === '/')         { e.preventDefault(); op('/'); return; }
  if (e.key === 'Enter' || e.key === '=') { eq(); return; }
  if (e.key === 'Backspace') { del(); return; }
  if (e.key === 'Escape')    { clearAll(); return; }
  if (e.key === '%')         { percent(); return; }
});
</script>
</body>
</html>
