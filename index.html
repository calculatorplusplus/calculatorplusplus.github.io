<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .calc {
      background: #1c1c1e;
      border-radius: 20px;
      padding: 20px;
      width: 300px;
    }
    .calc-display {
      background: #000;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 16px;
      text-align: right;
    }
    .calc-expr {
      font-size: 13px;
      color: #888;
      font-family: 'SF Mono', 'Courier New', monospace;
      min-height: 18px;
      margin-bottom: 4px;
    }
    .calc-result {
      font-size: 40px;
      color: #fff;
      font-family: 'SF Mono', 'Courier New', monospace;
      font-weight: 300;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .btn {
      border: none;
      border-radius: 50%;
      width: 62px;
      height: 62px;
      font-size: 20px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 400;
      transition: opacity 0.1s;
      outline: none;
    }
    .btn:active { opacity: 0.6; transform: scale(0.97); }
    .btn-func { background: #a1a1a6; color: #1c1c1e; }
    .btn-op   { background: #ff9f0a; color: #fff; }
    .btn-num  { background: #333336; color: #fff; }
    .btn-zero {
      grid-column: span 2;
      width: 100%;
      border-radius: 31px;
      text-align: left;
      padding-left: 24px;
    }
  </style>
</head>
<body>
  <div class="calc">
    <div class="calc-display">
      <div class="calc-expr" id="expr"></div>
      <div class="calc-result" id="result">0</div>
    </div>
    <div class="calc-grid">
      <button class="btn btn-func" onclick="calcAC()">AC</button>
      <button class="btn btn-func" onclick="calcSign()">+/−</button>
      <button class="btn btn-func" onclick="calcPct()">%</button>
      <button class="btn btn-op"   onclick="calcOp('/')">÷</button>

      <button class="btn btn-num" onclick="calcNum('7')">7</button>
      <button class="btn btn-num" onclick="calcNum('8')">8</button>
      <button class="btn btn-num" onclick="calcNum('9')">9</button>
      <button class="btn btn-op"  onclick="calcOp('*')">×</button>

      <button class="btn btn-num" onclick="calcNum('4')">4</button>
      <button class="btn btn-num" onclick="calcNum('5')">5</button>
      <button class="btn btn-num" onclick="calcNum('6')">6</button>
      <button class="btn btn-op"  onclick="calcOp('-')">−</button>

      <button class="btn btn-num" onclick="calcNum('1')">1</button>
      <button class="btn btn-num" onclick="calcNum('2')">2</button>
      <button class="btn btn-num" onclick="calcNum('3')">3</button>
      <button class="btn btn-op"  onclick="calcOp('+')">+</button>

      <button class="btn btn-num btn-zero" onclick="calcNum('0')">0</button>
      <button class="btn btn-num" onclick="calcDot()">.</button>
      <button class="btn btn-op"  onclick="calcEq()">=</button>
    </div>
  </div>

  <script>
    let cur = '0', prev = '', op = null, reset = false;

    const $r = document.getElementById('result');
    const $e = document.getElementById('expr');
    const SYM = { '/': '÷', '*': '×', '-': '−', '+': '+' };

    function display(v) { $r.textContent = v; }
    function exprDisplay(v) { $e.textContent = v; }

    function calcNum(n) {
      if (reset) { cur = n; reset = false; }
      else cur = cur === '0' ? n : cur + n;
      display(cur);
    }
    function calcDot() {
      if (reset) { cur = '0.'; reset = false; display(cur); return; }
      if (!cur.includes('.')) { cur += '.'; display(cur); }
    }
    function calcOp(o) {
      if (op && !reset) calcEq();
      prev = cur; op = o; reset = true;
      exprDisplay(prev + ' ' + SYM[o]);
    }
    function calcEq() {
      if (!op) return;
      const a = parseFloat(prev), b = parseFloat(cur);
      let r;
      if (op === '+') r = a + b;
      else if (op === '-') r = a - b;
      else if (op === '*') r = a * b;
      else if (op === '/') r = b === 0 ? NaN : a / b;
      exprDisplay(prev + ' ' + SYM[op] + ' ' + cur + ' =');
      cur = isNaN(r) ? 'Error' : String(parseFloat(r.toFixed(10)));
      display(cur); op = null; reset = true;
    }
    function calcAC()   { cur = '0'; prev = ''; op = null; reset = false; display('0'); exprDisplay(''); }
    function calcSign() { if (cur !== 'Error') { cur = String(parseFloat(cur) * -1); display(cur); } }
    function calcPct()  { if (cur !== 'Error') { cur = String(parseFloat(cur) / 100); display(cur); } }

    // Konami code → redirect in same tab
    const KONAMI = ['ArrowUp','ArrowDown','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
    let ki = 0;
    document.addEventListener('keydown', e => {
      ki = e.key === KONAMI[ki] ? ki + 1 : (e.key === KONAMI[0] ? 1 : 0);
      if (ki === KONAMI.length) {
        ki = 0;
        window.location.href = 'https://truffled.lol';
      }
    });
  </script>
</body>
</html>
